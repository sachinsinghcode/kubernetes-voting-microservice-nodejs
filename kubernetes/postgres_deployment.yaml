apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432

        env:
        - name: POSTGRES_USER
          value: postgres

        - name: POSTGRES_PASSWORD
          value: postgres

        - name: POSTGRES_DB
          value: votes

        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - pg_isready -U postgres -d votes
          initialDelaySeconds: 10
          periodSeconds: 5

        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - pg_isready -U postgres -d votes
          initialDelaySeconds: 5
          periodSeconds: 5