apiVersion: apps/v1
kind: Deployment
metadata:
  name: vote-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vote-service
  template:
    metadata:
      labels:
        app: vote-service
    spec:
      containers:
      - name: vote-service
        image: neeeeeeeeraj/voter-service:latest
        ports:
        - containerPort: 80

        env:
        - name: DB_USER
          value: postgres

        - name: DB_PASSWORD
          value: postgres

        - name: DB_NAME
          value: votes

        - name: DB_HOST
          value: postgres

        - name: DB_PORT
          value: "5432"

        - name: PORT
          value: "80"

---
apiVersion: v1
kind: Service
metadata:
  name: vote-service
spec:
  selector:
    app: vote-service

  ports:
  - port: 80
    targetPort: 80

  type: ClusterIP